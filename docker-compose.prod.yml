services:
  public:
    build: .
    restart: unless-stopped
    ports:
      - "80:8000"
    environment:
      DATABASE_URL: postgresql://recipes:${DB_PASSWORD}@db:5432/recipes
    command: uvicorn main:public_app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy

  private:
    build: .
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://recipes:${DB_PASSWORD}@db:5432/recipes
    command: uvicorn main:private_app --host 0.0.0.0 --port 8001
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: recipes
      POSTGRES_USER: recipes
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recipes"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
