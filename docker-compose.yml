services:
  public:
    image: ghcr.io/lopeznathan/recipes:latest
    restart: unless-stopped
    ports:
      - "80:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: uvicorn main:public_app --host 0.0.0.0 --port 8000

  private:
    image: ghcr.io/lopeznathan/recipes:latest
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: uvicorn main:private_app --host 0.0.0.0 --port 8001
