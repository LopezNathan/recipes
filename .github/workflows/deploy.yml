name: Build and Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write
  packages: write
  id-token: write # GitHub OIDC token for keyless GCP auth (Workload Identity Federation)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker tags
        id: tags
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            echo "tags=ghcr.io/lopeznathan/recipes:latest,ghcr.io/lopeznathan/recipes:${VERSION}" >> $GITHUB_OUTPUT
          else
            echo "tags=ghcr.io/lopeznathan/recipes:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    # Shared with rebuild.yml so a deploy never SSHes into a half-rebuilt server.
    concurrency:
      group: recipes-server
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/236742026496/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-ci@recipes-496402.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Pull and restart
        # gcloud pushes a short-lived SSH key to project metadata and verifies
        # the server against host keys published to guest attributes at boot
        # (enable-guest-attributes in infra/compute.tf) — MITM-safe without a
        # pinned SSH_KNOWN_HOSTS secret, and it survives instance rebuilds.
        run: |
          gcloud compute ssh recipes-server --zone=us-east1-c --quiet \
            --ssh-key-expire-after=10m \
            --strict-host-key-checking=yes \
            --command='cd /opt/recipes && sudo docker compose pull && sudo docker compose up -d --remove-orphans --wait --wait-timeout 180'

  release:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} --generate-notes --repo ${{ github.repository }}
